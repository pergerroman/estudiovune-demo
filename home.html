<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Vuné - Diseño y comunicación visual</title>

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>

    <link href="https://fonts.googleapis.com/css2?family=Inter:ital,opsz,wght@0,14..32,100..900;1,14..32,100..900&display=swap" rel="stylesheet">
</head>

<body style="
    background-color: #edf2f5;
    margin: 0;
    font-family: 'Inter', sans-serif;
    font-weight: 265;
    font-style: normal;
    overflow: hidden;
">

    <section style="
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        height: 100vh;
        width: 100vw;
        min-height: 640px;
        gap: 20px;
    ">

        <!-- CONTENEDOR PRINCIPAL -->
        <div style="
            position: relative;
            display: flex;
            align-items: center;
            justify-content: center;
            height: 70vh;
            width: 100vw;
        ">

            <!-- TEXTO GIGANTE -->
            <p style="
                position: absolute;
                z-index: 1;
                font-size: 20vw;
                line-height: 65%;
                text-align: center;
                margin: 0;
                color: black;
                font-weight: 300;
            ">
                Web en<br>proceso
            </p>

            <!-- IMAGEN -->
            <img 
                src="./resources/img/web-vune.png"
                alt="Logo Vuné"
                style="
                    position: relative;
                    z-index: 2;
                    max-height: 60vh;
                    max-width: 90vw;
                "
            >

        </div>

        <!-- TEXTO INFERIOR -->
        <div style="z-index: 3;">

            <p class="w">
                Estamos trabajando
            </p>

            <p style="
                text-align: center;
                font-size: 20px;
                margin-top: 10px;
            ">
                Para consultas 
                <a href="mailto:info@estudiovune.com" class="mail">
                    info@estudiovune.com
                </a>
            </p>

        </div>

    </section>
    <style>
        .w{
             text-align: center;
                font-size: 50px;
                margin: 0;
                font-weight: 300;
        }
        /* MOBILE */
        @media (max-width: 868px){
            .w{
                font-size: 30px;
            }
        }
        a{
        color: #00a208 !important;
        text-decoration: none !important;
        }

        a:visited{
            color: #00a208 !important;
        }

        a:hover{
            opacity: .7;
        }
    </style>

</body>
</html>
